listener 1883
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Anonymous access allowed — Mosquitto runs inside the private iiot-net Docker
# network and is not exposed to the internet. This matches the production edge
# deployment model where the broker sits inside the customer's private OT network.
# If a customer requires MQTT authentication, enable password_file here.
allow_anonymous true
# password_file /mosquitto/config/passwd