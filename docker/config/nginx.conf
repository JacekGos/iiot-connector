events {
    worker_connections 1024;
}

http {
    upstream redpanda_console {
        server redpanda-console:8080;
    }

    server {
        listen 80;

        # Health check endpoint for Docker healthcheck
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Redpanda Console UI
        location /redpanda/ {
            proxy_pass http://redpanda_console/;
            proxy_set_header Host $host;
        }
    }
}