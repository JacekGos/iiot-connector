version: "3.8"

services:

  # ── Redpanda (Kafka-compatible event streaming) ──────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=${REDPANDA_LOG_LEVEL}
    ports:
      - "9092:9092"    # Kafka API (internal / app usage)
      - "19092:19092"  # Kafka API (external / host access)
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - iiot-net

  redpanda-init:
    image: redpandadata/redpanda:latest
    container_name: redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        rpk topic create raw-events --brokers redpanda:9092 --partitions 8 --topic-config retention.ms=86400000 --if-not-exists
        rpk topic create config-changes --brokers redpanda:9092 --partitions 4 --topic-config cleanup.policy=compact --if-not-exists
        rpk topic create connector-status --brokers redpanda:9092 --partitions 4 --topic-config retention.ms=86400000 --if-not-exists
    restart: "no"
    networks:
      - iiot-net

  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    environment:
      CONFIG_FILEPATH: /etc/redpanda/redpanda-console-config.yaml
    volumes:
      - ./config/redpanda-console-config.yaml:/etc/redpanda/redpanda-console-config.yaml:ro
    ports:
      - "8080:8080"    # Redpanda Console UI
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - iiot-net

  # ── PostgreSQL (configuration storage) ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: iiot_config
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d iiot_config"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iiot-net

  # ── TimescaleDB (time-series storage) ───────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    environment:
      POSTGRES_DB: iiot_timeseries
      POSTGRES_USER: ${TIMESCALEDB_USER}
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init/timescaledb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${TIMESCALEDB_USER} -d iiot_timeseries"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iiot-net

  # ── Mosquitto (MQTT broker) ──────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"    # MQTT
      - "9001:9001"    # MQTT over WebSocket
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iiot-net

  # ── Nginx (reverse proxy) ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - postgres
      - timescaledb
      - redpanda
      - mosquitto
      - redpanda-console
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - iiot-net

# ── Volumes ──────────────────────────────────────────────────────────────
volumes:
  redpanda_data:
    driver: local
  postgres_data:
    driver: local
  timescaledb_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_logs:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────
networks:
  iiot-net:
    driver: bridge